apiVersion: v1
kind: ConfigMap
metadata:
  name: donations-api-config
  namespace: solidarity-connection
  labels:
    app: solidarity-connection-donations
data:
  ASPNETCORE_ENVIRONMENT: "Development"
  ServiceBus__UseWebSockets: "false"
  DONATION_TOPIC: "donation-requested"
  DONATION_SUBSCRIPTION: "solidarity-connection-donations-api"
  NewRelic__OtlpEndpoint: "https://otlp.nr-data.net:4317"
  NewRelic__Protocol: "grpc"
